  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <!-- Brand Logo -->
    <a routerLink="/dashboard" class="brand-link">
      <img src="assets/images/logo1.png" alt="Chillsage" class="brand-image elevation-3">
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user (optional) -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <i class="nav-icon fas fa-tachometer-alt"></i>
        </div>
        <div class="info">
          <span class="panel-kicker">Resumen general</span>
          <a routerLink="/dashboard" class="d-block">Dashboard</a>
        </div>
      </div>

      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
          <li class="nav-item" [class.menu-open]="expandedSection === 'requests'" *ngIf="canRead('requests')">
            <button type="button" class="nav-link nav-toggle" (click)="toggleSection('requests')">
              <i class="nav-icon fas fa-file-import"></i>
              <p>
                Solicitudes
                <i class="right fas fa-angle-left" [class.rotate-icon]="expandedSection === 'requests'"></i>
              </p>
            </button>
            <ul class="nav nav-treeview" [class.nav-treeview-open]="expandedSection === 'requests'">
              <li class="nav-item">
                <a routerLink="requests/list"  class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Solicitudes abiertas</p>
                </a>
              </li>
              <li class="nav-item">
                <a routerLink="requests/all" class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Todas las solicitudes</p>
                </a>
              </li>
            </ul>
          </li>
          <li class="nav-item" [class.menu-open]="expandedSection === 'orders'" *ngIf="canRead('orders')">
            <button type="button" class="nav-link nav-toggle" (click)="toggleSection('orders')">
              <i class="nav-icon fas fa-layer-group"></i>
              <p>
                Ordenes
                <i class="fas fa-angle-left right" [class.rotate-icon]="expandedSection === 'orders'"></i>
              </p>
            </button>
            <ul class="nav nav-treeview" [class.nav-treeview-open]="expandedSection === 'orders'">
              <li class="nav-item">
                <a routerLink="orders/list" class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Ordenes pendientes</p>
                </a>
              </li>
              <li class="nav-item">
                <a routerLink="orders/finished" class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Ordenes terminadas</p>
                </a>
              </li>
            </ul>
          </li>
          <li class="nav-item" *ngIf="canRead('schedules')">
            <a routerLink="schedule" class="nav-link">
              <i class="nav-icon far fa-calendar"></i>
              <p>
                Cronogramas
              </p>
            </a>
          </li>
          <li class="nav-item" *ngIf="canRead('equipments')">
            <a routerLink="equipment/list" class="nav-link">
              <i class="nav-icon fas fa-hdd"></i>
              <p>
                Equipos
              </p>
            </a>
          </li>
          <li class="nav-item" *ngIf="canRead('clients')">
            <a routerLink="client/list" class="nav-link">
              <i class="nav-icon fas fa-building"></i>
              <p>
                Clientes
              </p>
            </a>
          </li>
          <li class="nav-item" [class.menu-open]="expandedSection === 'users'" *ngIf="canRead('users') || canRead('roles')">
            <button type="button" class="nav-link nav-toggle" (click)="toggleSection('users')">
              <i class="nav-icon fas fa-users"></i>
              <p>
                Usuarios y Roles
                <i class="fas fa-angle-left right" [class.rotate-icon]="expandedSection === 'users'"></i>
              </p>
            </button>
            <ul class="nav nav-treeview" [class.nav-treeview-open]="expandedSection === 'users'">
              <li class="nav-item" *ngIf="canRead('users')">
                <a routerLink="users/list" class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Usuarios</p>
                </a>
              </li>
              <li class="nav-item" *ngIf="canRead('roles')">
                <a routerLink="users/roles" class="nav-link">
                  <i class="fas fa-angle-double-right nav-icon"></i>
                  <p>Roles</p>
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
  </aside>
