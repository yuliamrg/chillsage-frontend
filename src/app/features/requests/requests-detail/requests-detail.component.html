<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Ver Solicitud</h1>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-info">
        <div class="card-header">
          <h3 class="card-title">Detalles</h3>
        </div>
        <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
        <form *ngIf="request">
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Fecha de Creacion</label>
                <input type="text" class="form-control" [value]="request.createdAt || '-'" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <input type="text" class="form-control" [value]="request.status" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-12">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea class="form-control" rows="4" [value]="request.description" disabled></textarea>
              </div>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/requests/list" class="btn btn-secondary">Volver</a>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
