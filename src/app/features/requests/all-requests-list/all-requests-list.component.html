<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Todas las solicitudes</h1>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover table-striped table-bordered table-sm">
          <thead>
            <tr>
              <th>ID</th>
              <th>Descripcion</th>
              <th>Estado</th>
              <th>Fecha creacion</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let request of requests">
              <td>{{ request.id }}</td>
              <td>{{ request.description }}</td>
              <td>{{ request.status }}</td>
              <td>{{ request.createdAt || '-' }}</td>
            </tr>
          </tbody>
        </table>
        <div class="d-flex justify-content-between align-items-center p-2 border-top">
          <div>Mostrando {{ requests.length }} de {{ pagination.total }} solicitudes</div>
          <div class="d-flex align-items-center">
            <label class="mb-0 mr-2">Pagina</label>
            <button class="btn btn-default btn-sm mr-2" type="button" (click)="goToPreviousPage()" [disabled]="!pagination.hasPreviousPage">Anterior</button>
            <span class="mr-2">{{ pagination.page }} / {{ pagination.totalPages || 1 }}</span>
            <button class="btn btn-default btn-sm mr-3" type="button" (click)="goToNextPage()" [disabled]="!pagination.hasNextPage">Siguiente</button>
            <select class="form-control form-control-sm w-auto" [(ngModel)]="pagination.limit" (ngModelChange)="onPageSizeChange()">
              <option *ngFor="let size of pageSizeOptions" [ngValue]="size">{{ size }}</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
