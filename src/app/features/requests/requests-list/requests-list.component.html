<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Solicitudes</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a routerLink="/dashboard">DashBoard</a></li>
            <li class="breadcrumb-item active">Listado de solicitudes</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Solicitudes</h3>
      </div>
      <div class="card-body p-0">
        <div class="m-2">
          <a routerLink="/requests/new" class="btn btn-success btn-md"><i class="fas fa-plus-circle"></i></a>
        </div>
        <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
        <table class="table table-hover table-striped table-bordered table-sm">
          <thead>
            <tr>
              <th class="text-center">ID</th>
              <th class="text-center">Descripcion</th>
              <th class="text-center">Estado</th>
              <th class="text-center">Fecha creacion</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let request of requests">
              <td>{{ request.id }}</td>
              <td>{{ request.description }}</td>
              <td>{{ request.status }}</td>
              <td>{{ request.createdAt || '-' }}</td>
              <td class="project-actions text-center">
                <a class="btn btn-info btn-sm mr-1" [routerLink]="['/requests/detail', request.id]">Ver</a>
                <a class="btn btn-warning btn-sm mr-1" [routerLink]="['/requests/edit', request.id]">Editar</a>
                <button class="btn btn-danger btn-sm" type="button" (click)="removeRequest(request.id)">Eliminar</button>
              </td>
            </tr>
            <tr *ngIf="!requests.length">
              <td colspan="5" class="text-center">No hay solicitudes registradas.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
