<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Crear Solicitud</h1>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-success">
        <div class="card-header">
          <h3 class="card-title">Nueva Solicitud</h3>
        </div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="row m-1">
            <div class="col-sm-8">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea rows="3" class="form-control" name="description" [(ngModel)]="form.description" required></textarea>
              </div>
            </div>
            <div class="col-sm-4">
              <div class="form-group">
                <label>Estado</label>
                <select class="form-control" name="status" [(ngModel)]="form.status">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Aprobada">Aprobada</option>
                  <option value="Anulada">Anulada</option>
                </select>
              </div>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/requests/list" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success ml-3" [disabled]="isSaving">
              {{ isSaving ? 'Guardando...' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
