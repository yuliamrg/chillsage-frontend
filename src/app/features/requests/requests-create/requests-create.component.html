<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Crear solicitud</h1>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-success">
        <div class="card-header">
          <h3 class="card-title">Nueva solicitud operativa</h3>
        </div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-3" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6 form-group" *ngIf="showClientSelector">
                <label>Cliente</label>
                <select class="form-control" name="clientId" [(ngModel)]="form.clientId">
                  <option [ngValue]="null">Usar cliente del usuario autenticado</option>
                  <option *ngFor="let client of clients" [ngValue]="client.id">{{ client.name }}</option>
                </select>
              </div>
              <div class="col-md-6 form-group" [class.col-md-12]="!showClientSelector">
                <label>Solicitante</label>
                <select class="form-control" name="requesterUserId" [(ngModel)]="form.requesterUserId">
                  <option [ngValue]="null">Usuario autenticado</option>
                  <option *ngFor="let user of requesters" [ngValue]="user.id">{{ user.firstName }} {{ user.lastName }}</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 form-group">
                <label>Equipo</label>
                <select class="form-control" name="equipmentId" [(ngModel)]="form.equipmentId" required>
                  <option [ngValue]="null">Seleccione un equipo</option>
                  <option *ngFor="let equipment of filteredEquipments" [ngValue]="equipment.id">
                    {{ equipment.name }} {{ equipment.fixedAssetCode ? '(' + equipment.fixedAssetCode + ')' : '' }}
                  </option>
                </select>
              </div>
              <div class="col-md-3 form-group">
                <label>Tipo</label>
                <select class="form-control" name="type" [(ngModel)]="form.type">
                  <option value="corrective">Correctivo</option>
                  <option value="preventive">Preventivo</option>
                  <option value="inspection">Inspeccion</option>
                </select>
              </div>
              <div class="col-md-3 form-group">
                <label>Prioridad</label>
                <select class="form-control" name="priority" [(ngModel)]="form.priority">
                  <option value="low">Baja</option>
                  <option value="medium">Media</option>
                  <option value="high">Alta</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Titulo</label>
              <input type="text" class="form-control" name="title" [(ngModel)]="form.title" required>
            </div>
            <div class="form-group">
              <label>Descripcion</label>
              <textarea rows="4" class="form-control" name="description" [(ngModel)]="form.description" required></textarea>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/requests/list" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success ml-3" [disabled]="isSaving">
              {{ isSaving ? 'Guardando...' : 'Guardar solicitud' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
