<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Editar Equipo</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a routerLink="/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a routerLink="/equipment/list">Listado de Equipos</a></li>
            <li class="breadcrumb-item active">Editar equipo</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-warning">
        <div class="card-header">
          <h3 class="card-title">Editar Equipo</h3>
        </div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="form.name" [disabled]="isPlanner" required>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Marca</label>
                <input type="text" class="form-control" name="brand" [(ngModel)]="form.brand" [disabled]="isPlanner">
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Modelo</label>
                <input type="text" class="form-control" name="model" [(ngModel)]="form.model" [disabled]="isPlanner">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Serie</label>
                <input type="text" class="form-control" name="serial" [(ngModel)]="form.serial" [disabled]="isPlanner" required>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Activo fijo</label>
                <input type="text" class="form-control" name="fixedAssetCode" [(ngModel)]="form.fixedAssetCode" [disabled]="isPlanner" required>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Cliente</label>
                <select class="form-control" name="clientId" [(ngModel)]="form.clientId" [disabled]="isPlanner">
                  <option [ngValue]="null">Seleccione el cliente...</option>
                  <option *ngFor="let client of clients" [ngValue]="client.id">{{ client.name }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Ubicacion</label>
                <input type="text" class="form-control" name="location" [(ngModel)]="form.location">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Alias</label>
                <input type="text" class="form-control" name="alias" [(ngModel)]="form.alias">
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-12">
              <div class="form-group">
                <label>Observaciones</label>
                <textarea class="form-control" rows="3" name="observations" [(ngModel)]="form.observations"></textarea>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Tipo</label>
                <input type="text" class="form-control" name="type" [(ngModel)]="form.type" [disabled]="isPlanner">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <select class="form-control" name="status" [(ngModel)]="form.status">
                  <option value="active">Activo</option>
                  <option value="inactive">Inactivo</option>
                  <option value="maintenance">Mantenimiento</option>
                  <option value="retired">Retirado</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Inicio de uso</label>
                <input type="datetime-local" class="form-control" name="useStartAt" [(ngModel)]="form.useStartAt">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Fin de uso</label>
                <input type="datetime-local" class="form-control" name="useEndAt" [(ngModel)]="form.useEndAt">
              </div>
            </div>
          </div>
          <div class="alert alert-info mx-2 mb-0" *ngIf="isPlanner">
            Como planeador solo puedes editar ubicacion, alias, observaciones, estado y rango de uso.
          </div>
          <div class="card-footer">
            <div class="row">
              <div class="col-sm-12 text-center">
                <a routerLink="/equipment/list" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-warning ml-3" [disabled]="isSaving">
                  {{ isSaving ? 'Guardando...' : 'Guardar' }}
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
