<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Ver Cliente</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item"><a routerLink="/client/list">Listado de Clientes</a></li>
            <li class="breadcrumb-item active">Detalles</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-info">
        <div class="card-header">
          <h3 class="card-title">Detalles del Cliente</h3>
        </div>
        <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
        <form *ngIf="client">
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="form-control" [value]="client.name" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Telefono</label>
                <input type="text" class="form-control" [value]="client.phone || '-'" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Direccion</label>
                <input type="text" class="form-control" [value]="client.address || '-'" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Correo</label>
                <input type="text" class="form-control" [value]="client.email" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea class="form-control" rows="3" [value]="client.description || '-'" disabled></textarea>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <input type="text" class="form-control" [value]="client.status || '-'" disabled>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="row">
              <div class="col-sm-12 text-center">
                <a routerLink="/client/list" class="btn btn-secondary">Volver</a>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
