<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Editar Cliente</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item"><a routerLink="/client/list">Listado de Clientes</a></li>
            <li class="breadcrumb-item active">Editar</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-warning">
        <div class="card-header">
          <h3 class="card-title">Editar Cliente</h3>
        </div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="form.name" [disabled]="isPlanner" [required]="!isPlanner">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Telefono</label>
                <input type="text" class="form-control" name="phone" [(ngModel)]="form.phone">
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Direccion</label>
                <input type="text" class="form-control" name="address" [(ngModel)]="form.address">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Correo</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="form.email" [disabled]="isPlanner" [required]="!isPlanner">
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea class="form-control" rows="3" name="description" [(ngModel)]="form.description"></textarea>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <select class="form-control" name="status" [(ngModel)]="form.status">
                  <option *ngFor="let status of statusOptions" [value]="status">{{ status === 'active' ? 'Activo' : 'Inactivo' }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="alert alert-info mx-2 mb-0" *ngIf="isPlanner">
            Como planeador solo puedes editar direccion, telefono, descripcion y estado.
          </div>
          <div class="card-footer">
            <div class="row">
              <div class="col-sm-12 text-center">
                <a routerLink="/client/list" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-warning ml-3" [disabled]="isSaving">
                  {{ isSaving ? 'Guardando...' : 'Guardar' }}
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
