<div class="content-wrapper">
  <section class="content-header"><div class="container-fluid"><div class="row mb-2"><div class="col-sm-6"><h1>Crear cronograma</h1></div></div></div></section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-success">
        <div class="card-header"><h3 class="card-title">Nuevo cronograma</h3></div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-3" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6 form-group" *ngIf="showClientSelector"><label>Cliente</label><select class="form-control" name="clientId" [(ngModel)]="form.clientId" (ngModelChange)="onClientChange()" required><option [ngValue]="null">Seleccione</option><option *ngFor="let client of clients" [ngValue]="client.id">{{ client.name }}</option></select></div>
              <div class="col-md-6 form-group" [class.col-md-12]="!showClientSelector"><label>Nombre</label><input class="form-control" name="name" [(ngModel)]="form.name" required></div>
            </div>
            <div class="row">
              <div class="col-md-6 form-group"><label>Tipo</label><select class="form-control" name="type" [(ngModel)]="form.type"><option value="preventive">Preventivo</option><option value="inspection">Inspeccion</option><option value="corrective">Correctivo</option></select></div>
              <div class="col-md-6 form-group"><label>Fecha programada</label><input type="datetime-local" class="form-control" name="scheduledDate" [(ngModel)]="form.scheduledDate" required></div>
            </div>
            <div class="form-group"><label>Descripcion</label><textarea class="form-control" rows="3" name="description" [(ngModel)]="form.description"></textarea></div>
            <div class="form-group">
              <label>Equipos asociados</label>
              <div class="border rounded p-2" style="max-height: 220px; overflow: auto;">
                <div class="form-check" *ngFor="let equipment of filteredEquipments">
                  <input class="form-check-input" type="checkbox" [checked]="form.equipmentIds.includes(equipment.id)" (change)="toggleEquipment(equipment.id)" [id]="'equipment-' + equipment.id">
                  <label class="form-check-label" [for]="'equipment-' + equipment.id">{{ equipment.name }} {{ equipment.fixedAssetCode ? '(' + equipment.fixedAssetCode + ')' : '' }}</label>
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer text-center"><a routerLink="/schedule/list" class="btn btn-secondary">Cancelar</a><button type="submit" class="btn btn-success ml-3" [disabled]="isSaving">{{ isSaving ? 'Guardando...' : 'Crear cronograma' }}</button></div>
        </form>
      </div>
    </div>
  </section>
</div>
