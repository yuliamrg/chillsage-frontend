<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6"><h1>Ordenes terminadas</h1></div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover table-striped table-bordered table-sm">
          <thead>
            <tr>
              <th>ID</th>
              <th>Solicitud</th>
              <th>Responsable</th>
              <th>Horas</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of orders">
              <td>{{ order.id }}</td>
              <td>{{ order.requestSummary || order.requestId || '-' }}</td>
              <td>{{ order.responsibleName || '-' }}</td>
              <td>{{ order.hours ?? '-' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
