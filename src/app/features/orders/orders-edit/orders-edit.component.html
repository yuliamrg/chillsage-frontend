<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6"><h1>Editar Orden</h1></div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-warning">
        <div class="card-header"><h3 class="card-title">Editar Orden</h3></div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Solicitud</label>
                <select class="form-control" name="requestId" [(ngModel)]="form.requestId">
                  <option [ngValue]="null">Seleccione la solicitud...</option>
                  <option *ngFor="let request of requests" [ngValue]="request.id">{{ request.description }}</option>
                </select>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Responsable</label>
                <select class="form-control" name="responsibleUserId" [(ngModel)]="form.responsibleUserId">
                  <option [ngValue]="null">Seleccione el usuario...</option>
                  <option *ngFor="let user of users" [ngValue]="user.id">{{ user.firstName }} {{ user.lastName }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea class="form-control" rows="3" name="description" [(ngModel)]="form.description"></textarea>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="form-group">
                <label>Estado</label>
                <select class="form-control" name="status" [(ngModel)]="form.status">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Aprobada">Aprobada</option>
                  <option value="Terminada">Terminada</option>
                  <option value="Anulada">Anulada</option>
                </select>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="form-group">
                <label>Horas</label>
                <input type="number" class="form-control" name="hours" [(ngModel)]="form.hours">
              </div>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/orders/list" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-warning ml-3">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
