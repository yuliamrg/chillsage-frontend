<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Ordenes</h1>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover table-striped table-bordered table-sm">
          <thead>
            <tr>
              <th>ID</th>
              <th>Solicitud</th>
              <th>Responsable</th>
              <th>Estado</th>
              <th>Horas</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of orders">
              <td>{{ order.id }}</td>
              <td>{{ order.requestSummary || order.requestId || '-' }}</td>
              <td>{{ order.responsibleName || '-' }}</td>
              <td>{{ order.status }}</td>
              <td>{{ order.hours ?? '-' }}</td>
              <td>
                <a class="btn btn-info btn-sm mr-1" [routerLink]="['/orders/detail', order.id]">Ver</a>
                <a class="btn btn-warning btn-sm mr-1" [routerLink]="['/orders/edit', order.id]">Editar</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
