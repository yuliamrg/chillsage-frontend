<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6"><h1>Ver Orden</h1></div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-info" *ngIf="order">
        <div class="card-header"><h3 class="card-title">Detalles</h3></div>
        <form>
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Solicitud</label>
                <input type="text" class="form-control" [value]="order.requestSummary || order.requestId || '-'" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Responsable</label>
                <input type="text" class="form-control" [value]="order.responsibleName || '-'" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <input type="text" class="form-control" [value]="order.status" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Horas</label>
                <input type="text" class="form-control" [value]="order.hours ?? '-'" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-12">
              <div class="form-group">
                <label>Descripcion</label>
                <textarea class="form-control" rows="3" [value]="order.description || '-'" disabled></textarea>
              </div>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/orders/list" class="btn btn-secondary">Volver</a>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
