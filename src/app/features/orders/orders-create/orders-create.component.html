<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6"><h1>Crear orden</h1></div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-success">
        <div class="card-header"><h3 class="card-title">Nueva orden de trabajo</h3></div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-3" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6 form-group">
                <label>Solicitud aprobada</label>
                <select class="form-control" name="requestId" [(ngModel)]="form.requestId" required>
                  <option [ngValue]="null">Seleccione una solicitud</option>
                  <option *ngFor="let request of requests" [ngValue]="request.id">{{ request.id }} - {{ request.title }}</option>
                </select>
              </div>
              <div class="col-md-6 form-group">
                <label>Tecnico asignado</label>
                <select class="form-control" name="assignedUserId" [(ngModel)]="form.assignedUserId">
                  <option [ngValue]="null">Sin asignar</option>
                  <option *ngFor="let user of technicians" [ngValue]="user.id">{{ user.firstName }} {{ user.lastName }}</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 form-group">
                <label>Inicio planeado</label>
                <input type="datetime-local" class="form-control" name="plannedStartAt" [(ngModel)]="form.plannedStartAt">
              </div>
              <div class="col-md-6 form-group">
                <label>Recibida a satisfaccion</label>
                <select class="form-control" name="receivedSatisfaction" [(ngModel)]="form.receivedSatisfaction">
                  <option [ngValue]="null">Sin definir</option>
                  <option [ngValue]="true">Si</option>
                  <option [ngValue]="false">No</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Diagnostico</label>
              <textarea class="form-control" rows="3" name="diagnosis" [(ngModel)]="form.diagnosis"></textarea>
            </div>
            <div class="form-group">
              <label>Notas de cierre preliminares</label>
              <textarea class="form-control" rows="3" name="closureNotes" [(ngModel)]="form.closureNotes"></textarea>
            </div>
          </div>
          <div class="card-footer text-center">
            <a routerLink="/orders/list" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success ml-3" [disabled]="isSaving">
              {{ isSaving ? 'Guardando...' : 'Crear orden' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
