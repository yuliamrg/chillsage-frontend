<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Ver Usuario</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a routerLink="/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a routerLink="/users/list">Listado de Usuarios</a></li>
            <li class="breadcrumb-item active">Detalles</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-info">
        <div class="card-header">
          <h3 class="card-title">Detalles</h3>
        </div>
        <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
        <form *ngIf="user">
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Usuario</label>
                <input type="text" class="form-control" [value]="user.username" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Email</label>
                <input type="text" class="form-control" [value]="user.email" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="form-control" [value]="user.firstName" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Apellido</label>
                <input type="text" class="form-control" [value]="user.lastName" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Cliente principal</label>
                <input type="text" class="form-control" [value]="user.primaryClientName || '-'" disabled>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Rol</label>
                <input type="text" class="form-control" [value]="user.roleName || '-'" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <input type="text" class="form-control" [value]="user.status || '-'" disabled>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Cobertura</label>
                <input type="text" class="form-control" [value]="formatCoverage()" disabled>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="row">
              <div class="col-sm-12 text-center">
                <a routerLink="/users/list" class="btn btn-secondary">Volver</a>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
