<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Editar Usuario</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a routerLink="/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a routerLink="/users/list">Listado de Usuarios</a></li>
            <li class="breadcrumb-item active">Editar Usuario</li>
          </ol>
        </div>
      </div>
    </div>
  </section>
  <section class="content">
    <div class="container-fluid">
      <div class="card card-warning">
        <div class="card-header">
          <h3 class="card-title">Editar Usuario</h3>
        </div>
        <form (ngSubmit)="submit()">
          <div class="alert alert-danger m-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="row m-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Nombre</label>
                <input type="text" class="form-control" name="firstName" [(ngModel)]="form.firstName" required>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Apellido</label>
                <input type="text" class="form-control" name="lastName" [(ngModel)]="form.lastName">
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Usuario</label>
                <input type="text" class="form-control" name="username" [(ngModel)]="form.username" required>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="form.email" required>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Cliente</label>
                <select class="form-control" name="clientId" [(ngModel)]="form.clientId">
                  <option [ngValue]="null">Seleccione el cliente...</option>
                  <option *ngFor="let client of clients" [ngValue]="client.id">{{ client.name }}</option>
                </select>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="form-group">
                <label>Rol</label>
                <select class="form-control" name="roleId" [(ngModel)]="form.roleId">
                  <option [ngValue]="null">Seleccione el rol...</option>
                  <option *ngFor="let role of roles" [ngValue]="role.id">{{ role.description }}</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row mx-1">
            <div class="col-sm-6">
              <div class="form-group">
                <label>Estado</label>
                <select class="form-control" name="status" [(ngModel)]="form.status">
                  <option value="active">Activo</option>
                  <option value="inactive">Inactivo</option>
                </select>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="row">
              <div class="col-sm-12 text-center">
                <a routerLink="/users/list" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-warning ml-3">Guardar</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
