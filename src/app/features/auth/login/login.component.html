<div class="login-page auth-page">
  <div class="login-box">
    <div class="card card-outline card-primary">
      <div class="card-header text-center">
        <span class="h1"><b>CHILL</b>SAGE</span>
        <p class="auth-kicker">Panel operativo</p>
      </div>
      <div class="card-body">
        <p class="login-box-msg">Ingresa con tu correo y contrasena</p>

        <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="input-group mb-3">
            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="Correo electronico"
              autocomplete="username"
            >
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-envelope"></span>
              </div>
            </div>
          </div>
          <small class="text-danger d-block mb-3" *ngIf="form.controls.email.touched && form.controls.email.invalid">
            Ingresa un correo valido.
          </small>

          <div class="input-group mb-3">
            <input
              type="password"
              class="form-control"
              formControlName="password"
              placeholder="Contrasena"
              autocomplete="current-password"
            >
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-lock"></span>
              </div>
            </div>
          </div>
          <small class="text-danger d-block mb-3" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            La contrasena es obligatoria.
          </small>

          <button type="submit" class="btn btn-primary btn-block" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Ingresando...' : 'Iniciar sesion' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
